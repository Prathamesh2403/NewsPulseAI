# A generic, single database configuration.

[alembic]
# path to migration scripts.
# Use forward slashes (/) also on windows to provide an os agnostic path
script_location = alembic

# sys.path prepend - prepend the given path to sys.path
# to allow importing from the project
prepend_sys_path = .

# the output encoding used when revision files
# are written from script.py.mako
# output_encoding = utf-8

# SQLAlchemy URL — overridden at runtime by env.py
sqlalchemy.url = postgresql+psycopg2://postgres:pratham24@localhost:5432/newsbot

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
