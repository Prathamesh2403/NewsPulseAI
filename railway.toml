[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "sh -c 'uvicorn app.main:app --host 0.0.0.0 --port $PORT'"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

# ─────────────────────────────────────────────────────────────────────────────
# Worker and Beat services are configured separately in the Railway dashboard
# using the SAME Dockerfile but different start commands:
#
#   Worker:
#     celery -A app.scheduler.celery_app worker --loglevel=info -Q news_bot --concurrency=1
#
#   Beat:
#     celery -A app.scheduler.celery_app beat --loglevel=info --scheduler redbeat.RedBeatScheduler
# ─────────────────────────────────────────────────────────────────────────────
