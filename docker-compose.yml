# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — LOCAL DEVELOPMENT ONLY
#
# Replaces the 4 separate terminal windows in development.
# Note: No --pool=solo needed here because Docker runs Linux,
#       which supports the default prefork pool natively.
#
# IMPORTANT: Inside Docker, containers communicate via service name (not localhost).
#   REDIS_URL is overridden here to use the 'redis' service hostname.
#   Your .env keeps localhost for normal non-Docker local dev.
#
# Usage:
#   docker-compose up --build     # Start all services
#   docker-compose down           # Stop and remove containers
# ─────────────────────────────────────────────────────────────────────────────

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://postgres.zpqgxhthkkmfkildqcgw:prathameshK%402@aws-1-ap-northeast-2.pooler.supabase.com:6543/postgres
      - DATABASE_URL_SYNC=postgresql+psycopg2://postgres.zpqgxhthkkmfkildqcgw:prathameshK%402@aws-1-ap-northeast-2.pooler.supabase.com:6543/postgres
    volumes:
      - ./app:/app/app          # live reload in dev
      - ./data:/app/data        # ChromaDB persistence in dev
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build: .
    command: >
      celery -A app.scheduler.celery_app worker
      --loglevel=info -Q news_bot --concurrency=1
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://postgres.zpqgxhthkkmfkildqcgw:prathameshK%402@aws-1-ap-northeast-2.pooler.supabase.com:6543/postgres
      - DATABASE_URL_SYNC=postgresql+psycopg2://postgres.zpqgxhthkkmfkildqcgw:prathameshK%402@aws-1-ap-northeast-2.pooler.supabase.com:6543/postgres
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy

  beat:
    build: .
    command: >
      celery -A app.scheduler.celery_app beat
      --loglevel=info
      --scheduler redbeat.RedBeatScheduler
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
