services:
  # ─────────────────────────────────────────────────────────────────────────────
  # Web Service — FastAPI API
  # Start command comes from Dockerfile CMD (shell form, expands $PORT).
  # ─────────────────────────────────────────────────────────────────────────────
  - type: web
    name: newspulse-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: CHROMADB_PATH
        value: /opt/render/project/src/data/vector_db
      - key: JWT_EXPIRY_HOURS
        value: "24"

      # ── Set these manually in Render dashboard (sync: false = secret) ────────
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false          # fill after Vercel deploys
      - key: JWT_SECRET_KEY
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: ADMIN_PASSWORD
        sync: false          # plain password — used by cron job to obtain JWT

      # ── LLM providers ────────────────────────────────────────────────────────
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false

      # ── News APIs ─────────────────────────────────────────────────────────────
      - key: NEWSDATA_API_KEY
        sync: false
      - key: NEWSAPI_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: GNEWS_API_KEY
        sync: false
      - key: APITUBE_API_KEY
        sync: false


