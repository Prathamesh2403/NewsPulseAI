services:
  # ─────────────────────────────────────────────────────────────────────────────
  # Web Service — FastAPI API
  # ─────────────────────────────────────────────────────────────────────────────
  - type: web
    name: newspulse-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    # Shell wrapper ensures $PORT is expanded before being passed to uvicorn
    startCommand: sh -c 'uvicorn app.main:app --host 0.0.0.0 --port $PORT'
    healthCheckPath: /
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: CHROMADB_PATH
        value: /opt/render/project/src/data/vector_db
      - key: JWT_EXPIRY_HOURS
        value: "24"

      # ── Set these manually in Render dashboard (sync: false = secret) ────────
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false          # fill after Vercel deploys
      - key: JWT_SECRET_KEY
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: ADMIN_PASSWORD
        sync: false          # plain password — used by cron job to obtain JWT

      # ── LLM providers ────────────────────────────────────────────────────────
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false

      # ── News APIs ─────────────────────────────────────────────────────────────
      - key: NEWSDATA_API_KEY
        sync: false
      - key: NEWSAPI_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: GNEWS_API_KEY
        sync: false
      - key: APITUBE_API_KEY
        sync: false

    # Persistent disk for ChromaDB vector embeddings
    disk:
      name: chromadb-data
      mountPath: /opt/render/project/src/data/vector_db
      sizeGB: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Cron Job — Scheduled Ingestion (replaces Celery Beat in production)
  # Runs at midnight and noon UTC every day.
  # Logs in to the API to obtain a JWT, then calls the trigger endpoint.
  # ─────────────────────────────────────────────────────────────────────────────
  - type: cron
    name: newspulse-ingestion-cron
    runtime: docker
    dockerfilePath: ./Dockerfile
    schedule: "0 0,12 * * *"   # midnight and noon UTC
    startCommand: |
      python -c "
      import httpx, os, sys

      api_url = os.environ['API_URL'].rstrip('/')
      username = os.environ['ADMIN_USERNAME']
      password = os.environ['ADMIN_PASSWORD']

      # Step 1: obtain JWT token
      login_resp = httpx.post(
          f'{api_url}/api/v1/auth/login',
          json={'username': username, 'password': password},
          timeout=30,
      )
      login_resp.raise_for_status()
      token = login_resp.json()['access_token']

      # Step 2: trigger ingestion
      trigger_resp = httpx.post(
          f'{api_url}/api/v1/admin/ingestion/trigger',
          headers={'Authorization': f'Bearer {token}'},
          timeout=30,
      )
      trigger_resp.raise_for_status()
      print('Ingestion triggered successfully:', trigger_resp.json())
      "
    envVars:
      # Update API_URL after the web service is deployed
      - key: API_URL
        value: https://newspulse-api.onrender.com
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false          # plain text password for login only
