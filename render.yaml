services:
  # ─────────────────────────────────────────────────────────────────────────────
  # Web Service — FastAPI API
  # Start command comes from Dockerfile CMD (shell form, expands $PORT).
  # ─────────────────────────────────────────────────────────────────────────────
  - type: web
    name: newspulse-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: CHROMADB_PATH
        value: /opt/render/project/src/data/vector_db
      - key: JWT_EXPIRY_HOURS
        value: "24"

      # ── Set these manually in Render dashboard (sync: false = secret) ────────
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false          # fill after Vercel deploys
      - key: JWT_SECRET_KEY
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: ADMIN_PASSWORD
        sync: false          # plain password — used by cron job to obtain JWT

      # ── LLM providers ────────────────────────────────────────────────────────
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false

      # ── News APIs ─────────────────────────────────────────────────────────────
      - key: NEWSDATA_API_KEY
        sync: false
      - key: NEWSAPI_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: GNEWS_API_KEY
        sync: false
      - key: APITUBE_API_KEY
        sync: false

    # Persistent disk for ChromaDB vector embeddings
    disk:
      name: chromadb-data
      mountPath: /opt/render/project/src/data/vector_db
      sizeGB: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Cron Job — Scheduled Ingestion (replaces Celery Beat in production)
  # Runs at midnight and noon UTC every day.
  # Uses a minimal Dockerfile.cron — just httpx + the trigger script.
  # CMD is defined in Dockerfile.cron: python /app/cron_trigger.py
  # ─────────────────────────────────────────────────────────────────────────────
  - type: cron
    name: newspulse-ingestion-cron
    runtime: docker
    dockerfilePath: ./Dockerfile.cron
    schedule: "0 0,12 * * *"   # midnight and noon UTC
    envVars:
      # Update API_URL after the web service is deployed
      - key: API_URL
        value: https://newspulse-api.onrender.com
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false          # plain text password for login only
